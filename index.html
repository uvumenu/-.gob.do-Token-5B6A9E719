<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación de Identidad - UVEMENU</title>

<style>
/* --- ESTILOS GENERALES (Exactamente los tuyos) --- */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative; 
    overflow-x: hidden; /* Evita scroll horizontal */
    background-image: url('fondo.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(31, 122, 76, 0.6); 
    z-index: 0; 
}

.shape-1, .shape-2 {
    content: "";
    position: absolute;
    width: 120%;
    height: 120%;
    background: linear-gradient(135deg, rgba(46, 139, 87, 0.4), rgba(102, 187, 106, 0.4));
    z-index: 1; 
}

.shape-1 {
    clip-path: polygon(0 0, 100% 0, 70% 40%, 0 70%);
    top: -10%;
    left: -10%;
}

.shape-2 {
    background: linear-gradient(135deg, rgba(31, 122, 76, 0.4), rgba(129, 199, 132, 0.4));
    clip-path: polygon(30% 0, 100% 0, 100% 100%, 0 100%);
    bottom: -10%;
    right: -10%;
}

/* --- CONTENEDOR PRINCIPAL (Tu diseño original) --- */
.verificacion {
    width: 900px;
    max-width: 95%;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    overflow: hidden;
    position: relative;
    z-index: 10; 
}

/* Header (Sin deformar, idéntico al tuyo) */
.header {
    background: linear-gradient(135deg, #1f7a4c, #4CAF50);
    color: white;
    padding: 25px 20px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 130px;
}

.logo {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 220px;
    max-height: 160px;
    object-fit: contain;
    z-index: 2;
}

.titulo {
    font-size: 26px;
    font-weight: bold;
    line-height: 1.15;
    text-transform: uppercase;
    text-align: center;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    z-index: 2;
    max-width: 520px;
    padding-left: 80px; /* Tu padding original */
}

/* --- CONTENIDO --- */
.contenido {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 40px;
    position: relative;
}

.foto-container {
    width: 260px;
    height: 320px;
    background: #f0f0f0;
    border-radius: 8px;
    overflow: hidden;
    border: 4px solid #e0e0e0;
    flex-shrink: 0; /* Evita que se encoja la foto */
}

.foto {
    width: 100%;
    height: 100%;
    object-fit: cover; 
}

.datos {
    font-size: 18px;
    color: #333;
    flex: 1; 
    min-width: 280px;
    position: relative;
}

.datos p {
    margin: 12px 0;
    border-bottom: 1px solid #eee;
    padding-bottom: 8px;
}

.datos b {
    color: #1f7a4c;
    margin-right: 5px;
}

.estado {
    margin-top: 25px;
    padding: 12px 20px;
    background: #4CAF50;
    color: white;
    font-weight: bold;
    border-radius: 6px;
    display: inline-block;
    font-size: 18px;
    box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
}

/* SELLO ABAJO A LA DERECHA (Corregido para estar más abajo) */
.sello-container {
    position: absolute;
    right: 30px;
    bottom: 10px; /* Posición baja solicitada */
    z-index: 5;
}

.sello {
    width: 135px;
    height: 135px;
    object-fit: contain;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35));
    transform: rotate(12deg);
}

/* -----------------------------------------------------------
   --- ADAPTACIÓN PARA CELULARES (Media Queries) ---
   Este código solo se activa en pantallas pequeñas (menos de 768px)
   para que no se corte el contenido, pero NO deforma el diseño principal.
-------------------------------------------------------------- */
@media (max-width: 768px) {
    /* Ajustes del Header en móvil para que quepa el texto */
    .header {
        flex-direction: column; /* Apila logo y título */
        padding: 20px;
        min-height: auto;
    }

    .logo {
        position: relative; /* Quita el posicionamiento absoluto */
        left: auto;
        top: auto;
        transform: none;
        width: 150px; /* Logo más pequeño en móvil */
        margin-bottom: 15px;
    }

    .titulo {
        padding-left: 0; /* Quita el padding lateral en móvil */
        font-size: 20px; /* Texto un poco más pequeño */
        max-width: 100%;
    }

    /* Ajustes del contenido en móvil */
    .contenido {
        flex-direction: column; /* Apila foto y datos */
        align-items: center;
        padding: 30px 20px;
        padding-bottom: 80px; /* Espacio extra abajo para el sello */
        gap: 25px;
    }

    .foto-container {
        width: 220px; /* Foto un poco más pequeña */
        height: 270px;
    }

    .datos {
        width: 100%;
        min-width: auto;
        text-align: center; /* Centra los textos en móvil */
    }

    .datos p {
        justify-content: center;
    }

    /* Ajuste del sello en móvil */
    .sello-container {
        right: 20px;
        bottom: 10px;
    }

    .sello {
        width: 100px; /* Sello más pequeño en móvil */
        height: 100px;
    }
}
</style>
</head>
<body>

<div class="shape-1"></div>
<div class="shape-2"></div>

<div class="verificacion">

    <div class="header">
        <img src="logo.png" alt="Logo UVEMENU" class="logo">
        <div class="titulo">
            UNIÓN DE VENDEDORES<br>
            DEL MERCADO NUEVO<br>
            (UVEMENU)
        </div>
    </div>

    <div class="contenido">
        <div class="foto-container">
            <img src="foto.png" alt="Foto de Gabriel Pimentel" class="foto">
        </div>

        <div class="datos">
            <p><b>Nombre:</b> GABRIEL PIMENTEL</p>
            <p><b>Cédula:</b> 001-1242039-3</p>
            <p><b>Cargo:</b> Miembro</p>
            <p><b>Código:</b> 0025</p>
            <p><b>Fecha de ingreso:</b> 01/01/2024</p>

            <div class="estado">✔ IDENTIDAD VÁLIDA</div>
        </div>

        <!-- Sello abajo a la derecha -->
        <div class="sello-container">
            <img src="sello.png" alt="Sello UVEMENU" class="sello">
        </div>
    </div>

</div>

</body>
</html>
